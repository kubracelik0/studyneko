name: study_tracker
description: "Study Tracker and Pomodoro Timer App - CEN306 Final Project"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.0
  path: ^1.9.0

  # State Management
  provider: ^6.1.2

  # Utilities
  intl: ^0.19.0

  # Fonts
  google_fonts: ^6.2.1

  just_audio: ^0.9.36

  # WebView (müzik ekranı için)
  webview_flutter: ^4.7.0

  # URL Launcher (harici link açmak için)
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.8


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:

    - assets/audio/lofi_1.mp3
    - assets/audio/lofi_2.mp3
    - assets/audio/lofi_3.mp3
    - assets/audio/lofi_4.mp3
    - assets/audio/lofi_5.mp3
    - assets/audio/lofi_6.mp3
    - assets/audio/lofi_7.mp3
    - assets/audio/lofi_8.mp3
    - assets/audio/lofi_9.mp3
    - assets/audio/lofi_10.mp3
    - assets/audio/lofi_11.mp3
    - assets/audio/lofi_12.mp3
    - assets/audio/lofi_13.mp3
